<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

</head>
<body>

    <header>
        <nav class="navbar">
            <a href="#" class="logo"><img class="logo" src="garage blanc.png" width="100" height="100"></a>
            <div class="nav-links">

    <div class="content">

        <form id="loginForm">

            <br>

            <br>
            <button type="button" onclick="connexion()">Se Connecter</button>
        </form>
    </div>

    <footer><p>© 2024 V.Parrot Garage Auto. Tous droits réservés</p></footer>
    <script>
        const menuHamburger = document.querySelector(".menu-hamburger");
        const navLinks = document.querySelector(".nav-links");
    
        menuHamburger.addEventListener('click', () => {
            navLinks.classList.toggle('mobile-menu');
        });
    </script>
    <script src="connexion.js"></script>
